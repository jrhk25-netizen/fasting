<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<meta name="theme-color" content="#faf9f7">
<title>16:8 轻断食</title>

<script>
(function(){
  var c=document.createElement('canvas');
  c.width=180;c.height=180;
  var ctx=c.getContext('2d');
  ctx.fillStyle='#faf9f7';
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(0,0,180,180,36);
  else ctx.rect(0,0,180,180);
  ctx.fill();
  ctx.font='110px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('🍵',90,95);
  var url=c.toDataURL('image/png');
  document.getElementById('appIcon').href=url;
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #faf9f7;
  --surface: #ffffff;
  --border: #ede9e3;
  --text: #2c2825;
  --muted: #9e9589;
  --accent: #5c8a6e;
  --accent-light: #eef5f1;
  --warn: #c4703a;
  --warn-light: #fdf3ec;
  --water: #5b8fc4;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
body { background:var(--bg); color:var(--text); font-family:'Noto Sans SC',sans-serif; min-height:100vh; padding-bottom:100px; }
.nav { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
.nav-btn { flex:1; padding:12px 8px; border:none; background:none; font-family:'Noto Sans SC',sans-serif; font-size:11px; color:var(--muted); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; transition:color 0.2s; }
.nav-btn .icon { font-size:20px; }
.nav-btn.active { color:var(--accent); }
.page { display:none; padding:24px 20px 0; }
.page.active { display:block; }
.page-header { margin-bottom:24px; padding-top:16px; }
.page-title { font-family:'Playfair Display',serif; font-size:26px; font-weight:400; color:var(--text); }
.page-sub { font-size:13px; color:var(--muted); margin-top:4px; }

/* Timer */
.status-pill { display:inline-flex; align-items:center; gap:6px; padding:5px 14px; border-radius:999px; font-size:12px; margin-bottom:28px; }
.status-pill.fasting { background:#f0edf9; color:#7c6ab5; }
.status-pill.eating { background:var(–accent-light); color:var(–accent); }
.status-dot { width:6px; height:6px; border-radius:50%; animation:blink 2s infinite; }
.fasting .status-dot { background:#7c6ab5; }
.eating .status-dot { background:var(–accent); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.timer-block { text-align:center; margin-bottom:32px; }
.timer-big { font-family:‘DM Mono’,monospace; font-size:58px; font-weight:300; letter-spacing:-2px; color:var(–text); line-height:1; }
.timer-label { font-size:13px; color:var(–muted); margin-top:8px; }
.progress-wrap { background:var(–border); border-radius:999px; height:6px; margin:0 0 32px; overflow:hidden; }
.progress-bar { height:100%; border-radius:999px; transition:width 1s ease, background 0.5s; }
.progress-bar.fasting { background:#9b8ed4; }
.progress-bar.eating { background:var(–accent); }
.window-card { background:var(–surface); border:1px solid var(–border); border-radius:20px; padding:20px; box-shadow:var(–shadow); margin-bottom:20px; }
.wc-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(–border); }
.wc-row:last-child { border-bottom:none; padding-bottom:0; }
.wc-row:first-child { padding-top:0; }
.wc-left { font-size:13px; color:var(–muted); }
.wc-right { font-family:‘DM Mono’,monospace; font-size:15px; color:var(–text); }
.wc-badge { font-size:10px; padding:2px 8px; border-radius:999px; margin-left:8px; }
.badge-eat { background:var(–accent-light); color:var(–accent); }
.badge-fast { background:#f0edf9; color:#7c6ab5; }
.setting-card { background:var(–surface); border:1px solid var(–border); border-radius:20px; padding:20px; box-shadow:var(–shadow); }
.setting-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; }
.setting-label { font-size:13px; color:var(–text); }
.time-input { background:var(–bg); border:1px solid var(–border); border-radius:10px; color:var(–text); font-family:‘DM Mono’,monospace; font-size:14px; padding:6px 12px; width:90px; text-align:center; }
.time-input:focus { outline:none; border-color:var(–accent); }
.section-label { font-size:11px; letter-spacing:1px; color:var(–muted); margin-bottom:6px; font-family:‘DM Mono’,monospace; text-transform:uppercase; }

/* Water */
.water-hero { background:var(–surface); border:1px solid var(–border); border-radius:24px; padding:24px 20px; box-shadow:var(–shadow); margin-bottom:20px; text-align:center; }
.water-amount { font-family:‘Playfair Display’,serif; font-size:52px; color:var(–water); line-height:1; }
.water-amount span { font-size:20px; color:var(–muted); font-family:‘Noto Sans SC’; font-weight:300; }
.water-target { font-size:12px; color:var(–muted); margin-top:4px; margin-bottom:16px; }
.water-bar-wrap { background:var(–border); border-radius:999px; height:8px; overflow:hidden; margin-bottom:8px; }
.water-bar { height:100%; border-radius:999px; background:var(–water); transition:width 0.5s ease; }
.water-targets { display:flex; justify-content:space-between; font-size:10px; color:var(–muted); font-family:‘DM Mono’,monospace; }
.warn-box { background:var(–warn-light); border:1px solid #f0c9a8; border-radius:14px; padding:12px 16px; font-size:12px; color:var(–warn); margin-bottom:20px; display:none; }
.warn-box.show { display:block; }
.quick-add { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
.quick-btn { background:var(–surface); border:1px solid var(–border); border-radius:16px; padding:14px 8px; text-align:center; cursor:pointer; box-shadow:var(–shadow); }
.quick-btn:active { transform:scale(0.96); }
.quick-btn .qb-icon { font-size:22px; margin-bottom:4px; }
.quick-btn .qb-label { font-size:11px; color:var(–muted); }
.quick-btn .qb-ml { font-family:‘DM Mono’,monospace; font-size:13px; color:var(–text); }
.custom-water { background:var(–surface); border:1px solid var(–border); border-radius:20px; padding:16px 20px; box-shadow:var(–shadow); margin-bottom:20px; }
.custom-water-row { display:flex; gap:10px; align-items:center; margin-top:10px; }
.ml-input { flex:1; background:var(–bg); border:1px solid var(–border); border-radius:10px; padding:10px 14px; font-family:‘DM Mono’,monospace; font-size:15px; color:var(–text); }
.ml-input:focus { outline:none; border-color:var(–water); }
.type-select { background:var(–bg); border:1px solid var(–border); border-radius:10px; padding:10px; font-family:‘Noto Sans SC’,sans-serif; font-size:13px; color:var(–text); -webkit-appearance:none; }
.add-btn { padding:10px 18px; background:var(–water); color:white; border:none; border-radius:10px; font-family:‘Noto Sans SC’,sans-serif; font-size:13px; cursor:pointer; white-space:nowrap; }
.log-section { margin-bottom:20px; }
.log-title { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(–muted); margin-bottom:12px; font-family:‘DM Mono’,monospace; }
.log-item { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:var(–surface); border:1px solid var(–border); border-radius:14px; margin-bottom:8px; box-shadow:var(–shadow); }
.log-left { display:flex; align-items:center; gap:10px; }
.log-icon { font-size:18px; }
.log-type { font-size:13px; color:var(–text); }
.log-time { font-size:11px; color:var(–muted); margin-top:2px; font-family:‘DM Mono’,monospace; }
.log-ml { font-family:‘DM Mono’,monospace; font-size:14px; color:var(–water); }
.log-delete { background:none; border:none; color:var(–muted); font-size:18px; cursor:pointer; padding:4px 8px; margin-left:4px; }
.empty-state { text-align:center; padding:32px; color:var(–muted); font-size:13px; }
.empty-icon { font-size:32px; margin-bottom:8px; }

/* Meal */
.meal-add-card { background:var(–surface); border:1px solid var(–border); border-radius:20px; padding:20px; box-shadow:var(–shadow); margin-bottom:20px; }
.carb-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:12px 0; }
.carb-btn { padding:10px 6px; border:1.5px solid var(–border); border-radius:12px; background:var(–bg); font-family:‘Noto Sans SC’,sans-serif; font-size:12px; color:var(–muted); cursor:pointer; text-align:center; transition:all 0.15s; }
.carb-btn.selected { border-color:var(–accent); background:var(–accent-light); color:var(–accent); }
.meal-note-input { width:100%; background:var(–bg); border:1px solid var(–border); border-radius:10px; padding:10px 14px; font-family:‘Noto Sans SC’,sans-serif; font-size:13px; color:var(–text); margin-top:10px; resize:none; }
.meal-note-input:focus { outline:none; border-color:var(–accent); }
.meal-add-btn { width:100%; padding:14px; background:var(–accent); color:white; border:none; border-radius:14px; font-family:‘Noto Sans SC’,sans-serif; font-size:14px; cursor:pointer; margin-top:12px; }
.meal-add-btn:active { opacity:0.85; }
.history-day { margin-bottom:20px; }
.history-date { font-size:11px; letter-spacing:2px; color:var(–muted); margin-bottom:10px; font-family:‘DM Mono’,monospace; }
.meal-item { background:var(–surface); border:1px solid var(–border); border-radius:14px; padding:14px 16px; margin-bottom:8px; box-shadow:var(–shadow); display:flex; justify-content:space-between; align-items:flex-start; }
.meal-time { font-family:‘DM Mono’,monospace; font-size:12px; color:var(–muted); margin-bottom:4px; }
.meal-carb { display:inline-block; font-size:12px; padding:3px 10px; border-radius:999px; background:var(–accent-light); color:var(–accent); margin-bottom:4px; }
.meal-carb.no-carb { background:#f5f5f5; color:var(–muted); }
.meal-note-text { font-size:12px; color:var(–muted); margin-top:4px; }
.meal-delete { background:none; border:none; color:var(–muted); font-size:18px; cursor:pointer; padding:2px 6px; }

/* Toast */
.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(–text); color:white; border-radius:12px; padding:10px 20px; font-size:13px; opacity:0; transition:all 0.3s ease; z-index:999; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>

</head>
<body>

<div class="page active" id="page-timer">
  <div class="page-header">
    <div class="page-title">16 · 8 轻断食</div>
    <div class="page-sub" id="todayDate"></div>
  </div>
  <div class="status-pill fasting" id="statusPill">
    <span class="status-dot"></span>
    <span id="statusText">断食中</span>
  </div>
  <div class="timer-block">
    <div class="timer-big" id="timerDisplay">00:00:00</div>
    <div class="timer-label" id="timerLabel">距开窗</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar fasting" id="progressBar" style="width:0%"></div>
  </div>
  <div class="window-card">
    <div class="wc-row">
      <span class="wc-left">☀️ 进食开始</span>
      <span class="wc-right" id="wcEatStart">—</span>
    </div>
    <div class="wc-row">
      <span class="wc-left">🌙 进食结束</span>
      <span class="wc-right" id="wcEatEnd">—</span>
    </div>
  </div>
  <div class="setting-card">
    <div class="section-label">设置进食时间</div>
    <div class="setting-row">
      <div class="setting-label">开始进食</div>
      <input type="time" class="time-input" id="eatStartInput" value="10:00" onchange="saveSettings()">
    </div>
    <div class="setting-row">
      <div class="setting-label">停止进食</div>
      <input type="time" class="time-input" id="eatEndInput" value="18:00" onchange="saveSettings()">
    </div>
  </div>
</div>

<div class="page" id="page-water">
  <div class="page-header">
    <div class="page-title">喝水记录</div>
    <div class="page-sub">目标 1000–1500ml · 20:00前喝完</div>
  </div>
  <div class="water-hero">
    <div class="water-amount" id="waterAmount">0<span>ml</span></div>
    <div class="water-target" id="waterTargetText">距最低目标还差 1000ml</div>
    <div class="water-bar-wrap">
      <div class="water-bar" id="waterBar" style="width:0%"></div>
    </div>
    <div class="water-targets"><span>0</span><span>500ml</span><span>1000ml</span><span>1500ml</span></div>
  </div>
  <div class="warn-box" id="warnBox">⚠️ 现在是 20:00 后，尽量不再喝水，避免夜间起夜影响睡眠</div>
  <div class="quick-add">
    <div class="quick-btn" onclick="quickAdd(200,'水','💧')">
      <div class="qb-icon">💧</div>
      <div class="qb-ml">200ml</div>
      <div class="qb-label">一杯水</div>
    </div>
    <div class="quick-btn" onclick="quickAdd(350,'茶','🍵')">
      <div class="qb-icon">🍵</div>
      <div class="qb-ml">350ml</div>
      <div class="qb-label">一杯茶</div>
    </div>
    <div class="quick-btn" onclick="quickAdd(250,'咖啡','☕')">
      <div class="qb-icon">☕</div>
      <div class="qb-ml">250ml</div>
      <div class="qb-label">一杯咖啡</div>
    </div>
  </div>
  <div class="custom-water">
    <div class="section-label">自定义</div>
    <div class="custom-water-row">
      <input type="number" class="ml-input" id="customMl" placeholder="ml" min="50" max="2000">
      <select class="type-select" id="customType">
        <option value="水">💧 水</option>
        <option value="茶">🍵 茶</option>
        <option value="咖啡">☕ 咖啡</option>
        <option value="其他">🥤 其他</option>
      </select>
      <button class="add-btn" onclick="addCustomWater()">记录</button>
    </div>
  </div>
  <div class="log-section">
    <div class="log-title">今日记录</div>
    <div id="waterLog"></div>
  </div>
</div>

<div class="page" id="page-meal">
  <div class="page-header">
    <div class="page-title">进餐记录</div>
    <div class="page-sub">追踪碳水，了解饮食规律</div>
  </div>
  <div class="meal-add-card">
    <div class="section-label">记录这一餐</div>
    <div class="section-label" style="margin-top:14px">主食碳水</div>
    <div class="carb-grid">
      <div class="carb-btn" onclick="selectCarb(this,'米饭')">🍚 米饭</div>
      <div class="carb-btn" onclick="selectCarb(this,'面条')">🍜 面条</div>
      <div class="carb-btn" onclick="selectCarb(this,'凉皮')">🥗 凉皮</div>
      <div class="carb-btn" onclick="selectCarb(this,'馒头包子')">🥟 馒头</div>
      <div class="carb-btn" onclick="selectCarb(this,'其他碳水')">🌾 其他碳水</div>
      <div class="carb-btn" onclick="selectCarb(this,'无碳水')">🥬 无碳水</div>
    </div>
    <textarea class="meal-note-input" id="mealNote" rows="2" placeholder="备注（可选）：份量、感受..."></textarea>
    <button class="meal-add-btn" onclick="addMeal()">记录这一餐</button>
  </div>
  <div class="log-title">最近 7 天</div>
  <div id="mealHistory"></div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('timer',this)"><span class="icon">⏱</span>计时</button>
  <button class="nav-btn" onclick="showPage('water',this)"><span class="icon">💧</span>喝水</button>
  <button class="nav-btn" onclick="showPage('meal',this)"><span class="icon">🍽</span>进餐</button>
</nav>

<div class="toast" id="toast"></div>

<script>
var state = { eatStartHour:10, eatStartMin:0, eatEndHour:18, eatEndMin:0, waterLog:[], mealLog:[] };

function save(){ localStorage.setItem('if2', JSON.stringify(state)); }
function load(){ try{ var s=JSON.parse(localStorage.getItem('if2')); if(s) Object.assign(state,s); }catch(e){} }

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='water') renderWater();
  if(id==='meal') renderMeals();
}

function fmt2(n){ return String(n).padStart(2,'0'); }
function fmtTime(h,m){ return fmt2(h)+':'+fmt2(m); }

function getPhase(){
  var now=new Date();
  var nowM=now.getHours()*60+now.getMinutes();
  var startM=state.eatStartHour*60+state.eatStartMin;
  var endM=state.eatEndHour*60+state.eatEndMin;
  var isEating=nowM>=startM&&nowM<endM;
  var elapsed,total;
  if(isEating){
    elapsed=(nowM-startM)*60+now.getSeconds();
    total=(endM-startM)*60;
  } else {
    var secsToStart;
    if(nowM<startM) secsToStart=(startM-nowM)*60-now.getSeconds();
    else secsToStart=(24*60-nowM+startM)*60-now.getSeconds();
    var fastTotal=(24-(state.eatEndHour-state.eatStartHour))*3600;
    elapsed=fastTotal-secsToStart;
    total=fastTotal;
  }
  return {isEating:isEating, elapsed:Math.max(0,elapsed), total:total, remaining:Math.max(0,total-Math.max(0,elapsed))};
}

function fmtMs(sec){
  var h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
  return fmt2(h)+':'+fmt2(m)+':'+fmt2(s);
}

function updateTimer(){
  var p=getPhase();
  document.getElementById('statusPill').className='status-pill '+(p.isEating?'eating':'fasting');
  document.getElementById('statusText').textContent=p.isEating?'进食窗口 🍽':'断食中 💧';
  document.getElementById('timerDisplay').textContent=fmtMs(p.remaining);
  document.getElementById('timerLabel').textContent=p.isEating?'距关窗':'距开窗';
  var pct=p.total>0?Math.min(100,p.elapsed/p.total*100):0;
  var bar=document.getElementById('progressBar');
  bar.style.width=pct+'%';
  bar.className='progress-bar '+(p.isEating?'eating':'fasting');
  document.getElementById('wcEatStart').innerHTML=fmtTime(state.eatStartHour,state.eatStartMin)+'<span class="wc-badge badge-eat">可以吃</span>';
  document.getElementById('wcEatEnd').innerHTML=fmtTime(state.eatEndHour,state.eatEndMin)+'<span class="wc-badge badge-fast">停止吃</span>';
}

function saveSettings(){
  var s=document.getElementById('eatStartInput').value.split(':');
  var e=document.getElementById('eatEndInput').value.split(':');
  state.eatStartHour=parseInt(s[0]); state.eatStartMin=parseInt(s[1]);
  state.eatEndHour=parseInt(e[0]); state.eatEndMin=parseInt(e[1]);
  save(); updateTimer();
}

function updateDate(){
  var d=new Date();
  var days=['日','一','二','三','四','五','六'];
  document.getElementById('todayDate').textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 星期'+days[d.getDay()];
}

function typeIcon(t){ return t==='茶'?'🍵':t==='咖啡'?'☕':t==='其他'?'🥤':'💧'; }

function todayWater(){
  var today=new Date().toDateString();
  return state.waterLog.filter(function(w){ return new Date(w.time).toDateString()===today; });
}

function quickAdd(ml,type,icon){
  var h=new Date().getHours();
  state.waterLog.push({ml:ml,type:type,icon:icon,time:new Date().toISOString()});
  save(); renderWater();
  showToast(icon+' +'+ml+'ml 已记录'+(h>=20?' ⚠️注意已过20:00':''));
}

function addCustomWater(){
  var ml=parseInt(document.getElementById('customMl').value);
  var type=document.getElementById('customType').value;
  if(!ml||ml<50){showToast('请输入有效毫升数');return;}
  var h=new Date().getHours();
  state.waterLog.push({ml:ml,type:type,icon:typeIcon(type),time:new Date().toISOString()});
  document.getElementById('customMl').value='';
  save(); renderWater();
  showToast(typeIcon(type)+' +'+ml+'ml 已记录'+(h>=20?' ⚠️注意已过20:00':''));
}

function deleteWater(idx){
  var today=new Date().toDateString();
  var count=0;
  for(var i=0;i<state.waterLog.length;i++){
    if(new Date(state.waterLog[i].time).toDateString()===today){
      if(count===idx){state.waterLog.splice(i,1);break;}
      count++;
    }
  }
  save(); renderWater();
}

function renderWater(){
  var total=todayWater().reduce(function(s,w){return s+w.ml;},0);
  document.getElementById('waterAmount').innerHTML=total+'<span>ml</span>';
  document.getElementById('waterBar').style.width=Math.min(100,total/1500*100)+'%';
  var txt=total>=1500?'🎉 今天喝水达标！':total>=1000?'✅ 已达最低目标，距1500ml还差'+(1500-total)+'ml':'距最低目标1000ml还差'+(1000-total)+'ml';
  document.getElementById('waterTargetText').textContent=txt;
  var h=new Date().getHours();
  document.getElementById('warnBox').className='warn-box'+(h>=20?' show':'');
  var log=todayWater();
  var el=document.getElementById('waterLog');
  if(log.length===0){el.innerHTML='<div class="empty-state"><div class="empty-icon">💧</div>还没有记录，喝一杯吧！</div>';return;}
  el.innerHTML=log.slice().reverse().map(function(w,ri){
    var idx=log.length-1-ri;
    var t=new Date(w.time);
    return '<div class="log-item"><div class="log-left"><span class="log-icon">'+w.icon+'</span><div><div class="log-type">'+w.type+'</div><div class="log-time">'+fmt2(t.getHours())+':'+fmt2(t.getMinutes())+'</div></div></div><div style="display:flex;align-items:center"><span class="log-ml">+'+w.ml+'ml</span><button class="log-delete" onclick="deleteWater('+idx+')">×</button></div></div>';
  }).join('');
}

var selectedCarb='';
function selectCarb(el,carb){
  document.querySelectorAll('.carb-btn').forEach(function(b){b.classList.remove('selected');});
  el.classList.add('selected'); selectedCarb=carb;
}

function addMeal(){
  if(!selectedCarb){showToast('请选择主食碳水');return;}
  var note=document.getElementById('mealNote').value.trim();
  state.mealLog.push({carb:selectedCarb,note:note,time:new Date().toISOString()});
  save();
  document.querySelectorAll('.carb-btn').forEach(function(b){b.classList.remove('selected');});
  document.getElementById('mealNote').value='';
  selectedCarb='';
  renderMeals();
  showToast('🍽 进餐记录已保存');
}

function deleteMeal(idx){state.mealLog.splice(idx,1);save();renderMeals();}

function renderMeals(){
  var el=document.getElementById('mealHistory');
  var now=new Date();
  var days={};
  state.mealLog.forEach(function(m,i){
    var d=new Date(m.time);
    if((now-d)/86400000>7) return;
    var key=d.toDateString();
    if(!days[key]){var diff=Math.floor((now-d)/86400000);days[key]={label:diff===0?'今天':diff===1?'昨天':(d.getMonth()+1)+'月'+d.getDate()+'日',meals:[]};}
    days[key].meals.push({m:m,i:i});
  });
  var keys=Object.keys(days).sort(function(a,b){return new Date(b)-new Date(a);});
  if(keys.length===0){el.innerHTML='<div class="empty-state"><div class="empty-icon">🍽</div>还没有进餐记录</div>';return;}
  el.innerHTML=keys.map(function(k){
    var day=days[k];
    var items=day.meals.slice().reverse().map(function(item){
      var t=new Date(item.m.time);
      var isNoCarb=item.m.carb==='无碳水';
      return '<div class="meal-item"><div><div class="meal-time">'+fmt2(t.getHours())+':'+fmt2(t.getMinutes())+'</div><span class="meal-carb'+(isNoCarb?' no-carb':'')+'">'+(isNoCarb?'🥬 ':'🌾 ')+item.m.carb+'</span>'+(item.m.note?'<div class="meal-note-text">'+item.m.note+'</div>':'')+'</div><button class="meal-delete" onclick="deleteMeal('+item.i+')">×</button></div>';
    }).join('');
    return '<div class="history-day"><div class="history-date">'+day.label+'</div>'+items+'</div>';
  }).join('');
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

load();
document.getElementById('eatStartInput').value=fmt2(state.eatStartHour)+':'+fmt2(state.eatStartMin);
document.getElementById('eatEndInput').value=fmt2(state.eatEndHour)+':'+fmt2(state.eatEndMin);
updateDate(); updateTimer();
setInterval(updateTimer,1000);
setInterval(updateDate,60000);
</script>

</body>
</html>
